<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | Kraken Voley Club</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1 class="logo">KRAKEN VOLEY CLUB</h1>

    <nav>
      <ul class="menu">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="institucional.html">Institucional</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <!-- CONTENIDO -->
  <main>

    <!-- UBICACIÓN -->
    <section class="seccion">
      <h2>Dónde nos encontramos</h2>
      <p>📍 José A. Guardado y Rafael Bielsa, Barrio Las Flores</p>

      <div class="botones">
        <a href="https://www.google.com/maps" target="_blank" class="btn">Ver ubicación</a>
      </div>
    </section>

    <!-- FORMULARIO -->
    <section class="seccion">
      <h2>Contacto</h2>

      <form class="formulario">
        
        <label for="nombre">Nombre y apellido</label>
        <input type="text" id="nombre" name="nombre" placeholder="Escribí tu nombre y apellido" required>

        <label for="telefono">Teléfono de contacto</label>
        <input type="tel" id="telefono" name="telefono" placeholder="Escribí tu teléfono" required>

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribí tu mensaje..." required></textarea>

        <button type="submit" class="btn">Enviar consulta</button>
      </form>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>Kraken Voley Club ©</p>
  </footer>

</body>
</html>
